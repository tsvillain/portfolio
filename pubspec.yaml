name: portfolio
description: My Personal Portfolio.
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.6.0

environment:
  sdk: ">=2.12.0 <3.0.0"
dependencies:
  cupertino_icons: ^1.0.2
  flutter:
    sdk: flutter
  flutter_riverpod: ^1.0.2
  flutter_svg: ^1.1.0
  google_fonts: ^3.0.1
  http: ^0.13.4
  rive: ^0.8.4
  url_launcher: ^6.0.12

dev_dependencies:
  flutter_lints: ^2.0.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/projects/
    - assets/social_icons/
